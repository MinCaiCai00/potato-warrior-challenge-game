<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section id="home-screen" class="home-screen">
        <div id="loading-panel" class="loading-panel" aria-live="polite">
          <div class="runner-track" aria-hidden="true">
            <div id="home-runner" class="home-runner pixel-sprite"></div>
          </div>
          <div id="loading-bar" class="loading-bar">
            <span id="loading-progress"></span>
          </div>
          <p id="loading-text" class="loading-text"></p>
        </div>

        <div id="home-content" class="home-content home-ready hidden">
          <button id="start-btn" class="primary-btn image-btn" type="button" data-btn-action="start"></button>
        </div>
      </section>

      <section id="battle-screen" class="battle-screen hidden" aria-live="polite">
        <div class="top-actions">
          <button id="music-btn" class="icon-btn" type="button"></button>
          <button id="pause-btn" class="icon-btn" type="button"></button>
          <button id="home-btn" class="icon-btn" type="button"></button>
        </div>

        <header class="stage-header">
          <div>
            <p id="stage-label" class="stage-label"></p>
            <h2 id="boss-title"></h2>
          </div>
          <div id="badge-row" class="badge-row"></div>
        </header>

        <div class="arena">
          <article class="fighter player-card">
            <div class="stat-block">
              <div class="stat-row">
                <span id="player-hp-label" class="stat-label"></span>
                <div class="bar hp-bar">
                  <span id="player-hp-bar"></span>
                  <strong id="player-hp-text" class="bar-text"></strong>
                </div>
              </div>
              <div class="stat-row">
                <span id="power-label" class="stat-label"></span>
                <div class="bar power-bar">
                  <span id="power-bar"></span>
                  <strong id="power-text" class="bar-text"></strong>
                </div>
              </div>
            </div>

            <div class="player-body">
              <div class="control-row">
                <button id="attack-btn" class="action-btn attack-btn" type="button"></button>
                <button id="defend-btn" class="action-btn defend-btn" type="button"></button>
              </div>

              <div class="character-wrap">
                <div id="player" class="player sprite"></div>
                <div id="player-hit" class="hit-text"></div>
              </div>
            </div>
          </article>

          <div class="versus">
            <button id="charge-meter" class="charge-meter" type="button">
              <span class="charge-center">
                <strong id="charge-percent-text" class="charge-percent"></strong>
                <small id="charge-label" class="charge-label"></small>
              </span>
            </button>
          </div>

          <article class="fighter boss-card">
            <div class="stat-block">
              <div class="stat-row">
                <span id="boss-name" class="stat-label"></span>
                <div class="bar hp-bar boss-hp">
                  <span id="boss-hp-bar"></span>
                  <strong id="boss-hp-text" class="bar-text"></strong>
                </div>
              </div>
              <p id="boss-desc" class="boss-desc"></p>
            </div>

            <div id="battle-line-bubble" class="battle-line-bubble" aria-live="polite"></div>

            <div class="character-wrap">
              <div id="boss" class="boss sprite"></div>
              <div id="boss-hit" class="hit-text"></div>
            </div>
          </article>
        </div>


      </section>

      <section id="stage-clear-screen" class="stage-clear-screen hidden" aria-live="polite">
        <div class="stage-clear-card">
          <p id="stage-clear-kicker" class="kicker"></p>
          <h2 id="stage-clear-title"></h2>
          <p id="stage-clear-message" class="intro"></p>
        </div>
        <button id="next-stage-btn" class="primary-btn image-btn" type="button" data-btn-action="next"></button>
      </section>

      <section id="victory-screen" class="victory-screen hidden" aria-live="polite">
        <div class="victory-scene">


          <div id="victory-rescue-stage" class="rescue-stage">
            <div class="victory-player player sprite"></div>
            <div id="victory-princess" class="victory-princess sprite"></div>
          </div>

          <div class="reward-board">
            <strong id="victory-reward-line"></strong>
            <div id="victory-stars" class="victory-stars" aria-hidden="true"></div>
            
            <div class="victory-actions">
              <button id="victory-restart-btn" class="primary-btn image-btn" type="button" data-btn-action="restart"></button>
              <button id="victory-home-btn" class="primary-btn image-btn" type="button" data-btn-action="home"></button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-card">
        <h2 id="modal-title"></h2>
        <p id="modal-message"></p>
        <div id="reward" class="reward hidden">
          <div id="modal-princess" class="princess"></div>
          <p id="reward-line"></p>
        </div>
        <div id="modal-actions" class="modal-actions"></div>
      </div>
    </div>

    <audio id="bgm" src="assets/bgm/flowerbed_fields.ogg" preload="auto" loop></audio>
    <script src="script.js"></script>
  </body>
</html>
